<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>ПОТУЖНОСТЬ РУ — Design Canvas</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html,body{margin:0;padding:0;height:100%;background:#f0eee9;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
  #root{height:100%}
  iframe{border:0;display:block;width:100%;height:100%;background:#070403}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState } = React;

  function Frame({src}){
    return <iframe src={src} loading="lazy" title={src} />;
  }

  function App(){
    const W = 1440, H = 2200;
    return (
      <DesignCanvas>
        <DCSection
          id="potuzhnost"
          title="ПОТУЖНОСТЬ РУ"
          subtitle="3 направления для радио-сайта · Торонто · 2026">

          <DCArtboard id="vintage" label="01 · Винтаж-постер · ретро плакат + винил" width={W} height={H}>
            <Frame src="vintage/index.html" />
          </DCArtboard>

          <DCArtboard id="dub" label="02 · Даб-станция · орб-залипалка, дым" width={W} height={2400}>
            <Frame src="dub/index.html" />
          </DCArtboard>

          <DCArtboard id="tropical" label="03 · Тропик-стрит · закат, пальмы, кассета" width={W} height={H}>
            <Frame src="tropical/index.html" />
          </DCArtboard>

        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
